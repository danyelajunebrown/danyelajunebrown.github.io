    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    color: #fff;
    overflow: hidden;
    height: 100vh;
    background: #000;
    position: relative;
}

.background-media {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.background-media.active {
    opacity: 0.6;
}

.background-media img,
.background-media video,
.background-media iframe {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.background-media::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
    z-index: 2;
}

.nav-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    padding: 20px 0;
    z-index: 1000;
    text-align: center;
    backdrop-filter: blur(10px);
}

.nav-menu a {
    color: white;
    text-decoration: none;
    padding: 12px 25px;
    margin: 0 15px;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 1px;
    border: 1px solid transparent;
    transition: all 0.4s ease;
    text-transform: uppercase;
}

.nav-menu a:hover {
    border: 1px solid white;
    background: rgba(255,255,255,0.1);
}

.bottom-menu {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    padding: 15px 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
}

.toggle-btn {
    color: white;
    text-decoration: none;
    padding: 10px 20px;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 1px;
    border: 2px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
}

.toggle-btn:hover {
    border-bottom: 2px solid white;
}

.toggle-btn.active {
    border-bottom: 2px solid white;
}

.toggle-btn .arrow {
    font-size: 10px;
    margin-left: 3px;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.toggle-btn.active .arrow {
    opacity: 1;
}

.dropdown-container {
    position: relative;
}

.dropdown-menu {
    position: absolute;
    bottom: 100%;
    left: 0;
    margin-bottom: 5px;
    background: rgba(0,0,0,0.95);
    backdrop-filter: blur(20px);
    padding: 10px 0;
    display: none;
    flex-direction: column;
    gap: 5px;
    min-width: 200px;
    border: 1px solid transparent;
}

.dropdown-menu.show {
    display: flex;
    border-top: 2px solid white;
}

.dropdown-menu label {
    color: white;
    text-decoration: none;
    padding: 8px 20px;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 0.5px;
    border: 2px solid transparent;
    transition: all 0.3s ease;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
}

.dropdown-menu label:hover {
    border-bottom: 2px solid white;
}

.dropdown-menu input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
}

.floating-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 500;
    pointer-events: none;
}

.floating-title {
    position: absolute;
    color: white;
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 8px 12px;
    background: rgba(0,0,0,0.7);
    border-radius: 4px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    pointer-events: all;
    white-space: nowrap;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
}

.floating-title:hover {
    background: rgba(0,0,0,0.9);
    border-color: white;
    transform: scale(1.05);
}

.floating-title.selected {
    background: rgba(255,255,255,0.2);
    border-color: white;
}

.floating-title.hidden {
    display: none;
}

.project-info {

    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    text-align: center;

.project-info.show {

.info-year {

.btn {

.slider-handle {

.checkbox-group {

.checkbox-group label {

/* Vertical Carousel */
.carousel-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 800;
    background: #000;
    display: none;
}

.carousel-overlay.active {
    display: block;
}

.carousel-track {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
}

.carousel-slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease, transform 0.6s ease;
    transform: translateY(40px);
    pointer-events: none;
}

.carousel-slide.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
}

.carousel-slide.exit-up {
    opacity: 0;
    transform: translateY(-40px);
}

.carousel-slide.exit-down {
    opacity: 0;
    transform: translateY(40px);
}

.carousel-slide img,
.carousel-slide video {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
}

.carousel-slide iframe {
    width: 80vw;
    height: 70vh;
    border: none;
}

.carousel-dots {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 900;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.carousel-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.3s ease;
    border: none;
    padding: 0;
}

.carousel-dot.active {
    background: white;
    transform: scale(1.4);
}

.carousel-close {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 900;
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 18px;
    padding: 8px 14px;
    cursor: pointer;
    transition: border-color 0.3s;
}

.carousel-close:hover {
    border-color: white;
}

@media (max-width: 768px) {
    .super-user-interface {

        padding: 8px 10px;
    }
    .nav-menu a {

        font-size: 16px;
    }
}

    <script>

        };

        // Supabase
        const SUPABASE_URL = 'https://qbbgrsdofmhiqeusguoq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiYmdyc2RvZm1oaXFldXNndW9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzOTc4MTksImV4cCI6MjA5NDk3MzgxOX0.zT_YwQlALesrlqPwXvQpzZ05JJyK0nvLP1RDxlb5_fM';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function hashString(str) {
            const encoder = new TextEncoder();
            const data = encoder.encode(str);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const THEMES = ['autonomy', 'access', 'affect', 'black', 'neurogender'];
        const GENRES = ['set-set', 'costume-set', 'dance-set', 'code-set', 'performance-set', 'social practice-set', 'research-set', 'writing-set', 'installation-set', 'sculpture-set', 'ballroom'];

        // State
        let projects = [];
        let floatingElements = [];
        let currentSelectedIndex = -1;
        let activeSortAxis = null;
        let activeSortDirection = null;
        let activeFilters = { themes: [], genres: [] };
        let superUserActive = false;
        let currentScoringIndex = 0;
        let unscoredWorks = [];

        // Load projects from Supabase (fallback to JSON)
        async function loadProjects() {
            try {
                const { data: projectRows, error: pErr } = await db
                    .from('portfolio_projects')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (pErr) throw pErr;

                const { data: mediaRows, error: mErr } = await db
                    .from('portfolio_media')
                    .select('*')
                    .order('sort_order', { ascending: true });
                if (mErr) throw mErr;

                const mediaByProject = {};
                mediaRows.forEach(m => {
                    if (!mediaByProject[m.project_id]) mediaByProject[m.project_id] = [];
                    mediaByProject[m.project_id].push(m);
                });

                projects = projectRows.map(p => ({
                    id: p.id,
                    title: p.title,
                    date: p.date || '',
                    year: p.year,
                    materials: p.materials || [],
                    description: p.description || '',
                    mediaUrls: (mediaByProject[p.id] || []).map(m => m.url),
                    mediaTypes: (mediaByProject[p.id] || []).map(m => m.media_type),
                    scores: {
                        dearness: p.score_dearness,
                        completeness: p.score_completeness,
                        cost: p.score_cost,
                        themes: p.score_themes || [],
                        genres: p.score_genres || []
                    }
                }));

                console.log('Loaded projects from Supabase:', projects.length);
                initializeFloatingTitles();
                populateProjectSelect();
            } catch (error) {
                console.error('Supabase load failed, falling back to JSON:', error);
                try {
                    const response = await fetch('projects.json');
                    const data = await response.json();
                    projects = data.projects;
                    projects.forEach(project => {
                        if (!project.mediaUrls) {
                            project.mediaUrls = project.mediaUrl ? [project.mediaUrl] : [];
                            project.mediaTypes = project.mediaType ? [project.mediaType] : [];
                        }
                    });
                    initializeFloatingTitles();
                    populateProjectSelect();
                } catch (e) {
                    console.error('JSON fallback also failed:', e);
                }
            }
        }

        // Floating title class
        class FloatingTitle {
            constructor(project, index, container) {
                this.project = project;
                this.index = index;
                this.container = container;
                this.element = document.createElement('div');
                this.element.className = 'floating-title';
                this.element.textContent = project.title;
                
                this.x = Math.random() * (window.innerWidth - 300);
                this.y = Math.random() * (window.innerHeight - 200) + 100;
                
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                
                // Hover effect for dummy works
                if (project.isDummy) {
                    this.element.addEventListener('mouseenter', () => {
                        this.element.textContent = project.hoverTitle;
                    });
                    this.element.addEventListener('mouseleave', () => {
                        this.element.textContent = project.title;
                    });
                }
                
                this.element.addEventListener('click', () => {
                    selectProject(this.index);
                });
                
                this.container.appendChild(this.element);
            }
            
            update() {
                if (activeSortAxis) {
                    this.updateConstrained();
                } else {
                    this.updateFree();
                }
                
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
            }
            
            updateFree() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.x <= 0 || this.x >= window.innerWidth - this.element.offsetWidth) {
                    this.vx *= -1;
                    this.x = Math.max(0, Math.min(this.x, window.innerWidth - this.element.offsetWidth));
                }
                
                if (this.y <= 80 || this.y >= window.innerHeight - this.element.offsetHeight - 120) {
                    this.vy *= -1;
                    this.y = Math.max(80, Math.min(this.y, window.innerHeight - this.element.offsetHeight - 120));
                }
            }
            
            updateConstrained() {
                const score = this.getScore(activeSortAxis);
                let normalizedScore = score / 100;
                
                // Reverse if descending
                if (activeSortDirection === 'desc') {
                    normalizedScore = 1 - normalizedScore;
                }
                
                const targetX = (window.innerWidth - 300) * normalizedScore;
                
                this.x += (targetX - this.x) * 0.1;
                this.y += this.vy * 0.5;
                
                if (this.y <= 80 || this.y >= window.innerHeight - this.element.offsetHeight - 120) {
                    this.vy *= -1;
                    this.y = Math.max(80, Math.min(this.y, window.innerHeight - this.element.offsetHeight - 120));
                }
            }
            
            getScore(axis) {
                if (axis === 'chronology') {
                    const minYear = Math.min(...projects.filter(p => !p.isDummy).map(p => p.year));
                    const maxYear = Math.max(...projects.filter(p => !p.isDummy).map(p => p.year));
                    return ((this.project.year - minYear) / (maxYear - minYear)) * 100;
                }
                return this.project.scores?.[axis] || 50;
            }
        }

        function goToSlide(newIndex) {
            if (newIndex < 0 || newIndex >= carouselMedia.length || newIndex === carouselIndex) return;
            if (carouselScrollLocked) return;
            carouselScrollLocked = true;

            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            const direction = newIndex > carouselIndex ? 'up' : 'down';

            // Pause media on exiting slide
            slides[carouselIndex].querySelectorAll('video').forEach(v => v.pause());

            slides[carouselIndex].classList.remove('active');
            slides[carouselIndex].classList.add(direction === 'up' ? 'exit-up' : 'exit-down');

            const prevIndex = carouselIndex;
            carouselIndex = newIndex;

            setTimeout(() => {
                slides[prevIndex].classList.remove('exit-up', 'exit-down');
                slides[carouselIndex].classList.add('active');
                dots.forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
                carouselScrollLocked = false;
            }, 150);
        }

                    await saveMediaForProject(proj.id, proj.mediaUrls, proj.mediaTypes);
                    showMediaManager(proj);
                });
            });
        }

        async function uploadToR2(file) {
            const CHUNK_SIZE = 50 * 1024 * 1024; // 50MB chunks
            const fileId = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            const fileName = `${Date.now()}-${file.name}`;

            try {
                // Upload file in chunks
                for (let chunkIndex = 0; chunkIndex < totalChunks; chunkIndex++) {
                    const start = chunkIndex * CHUNK_SIZE;
                    const end = Math.min(start + CHUNK_SIZE, file.size);
                    const chunk = file.slice(start, end);

                    const formData = new FormData();
                    formData.append('file', chunk);
                    formData.append('filename', fileName);

                    const response = await fetch('https://r2-upload-handler.db7613.workers.dev/', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-Chunk-Index': chunkIndex.toString(),
                            'X-Total-Chunks': totalChunks.toString(),
                            'X-File-ID': fileId,
                        }
                    });

                    if (!response.ok) {
                        const errorText = await response.text();
                        throw new Error(`Chunk ${chunkIndex + 1} failed: ${errorText}`);
                    }

                    const data = await response.json();
                    
                    // Log progress
                    const progress = Math.round(((chunkIndex + 1) / totalChunks) * 100);
                    console.log(`R2 upload progress: ${progress}% (${chunkIndex + 1}/${totalChunks} chunks)`);

                    // If this is the last chunk and upload is complete
                    if (data.success && data.url) {
                        console.log('R2 upload successful:', data.url);
                        return data.url;
                    }
                }

                throw new Error('Upload did not complete');
            } catch (error) {
                console.error('R2 upload error:', error);
                throw error;
            }
        }

                 p.scores.themes.length === 0 ||

            currentScoringIndex = 0;
            
            // Initialize checkboxes FIRST (before loading work)
            initializeCheckboxes();
            
            // Then load the first work
            loadNextWorkToScore();
        }

        function initializeCheckboxes() {
            const themesContainer = document.getElementById('themesCheckboxes');
            const genresContainer = document.getElementById('genresCheckboxes');
            
            themesContainer.innerHTML = THEMES.map(theme => `
                <label>
                    <input type="checkbox" value="${theme}">
                    ${theme}
                </label>
            `).join('');
            
            genresContainer.innerHTML = GENRES.map(genre => `
                <label>
                    <input type="checkbox" value="${genre}">
                    ${genre}
                </label>
            `).join('');
        }

        function loadNextWorkToScore() {
            console.log('Loading work:', currentScoringIndex, 'of', unscoredWorks.length);
            
            if (currentScoringIndex >= unscoredWorks.length) {
                document.getElementById('workTitle').textContent = 'ALL DONE!';
                document.getElementById('scoringContent').style.opacity = '0.5';
                console.log('All works scored!');
                return;
            }
            
            const work = unscoredWorks[currentScoringIndex];
            
            if (!work) {
                console.error('Work is undefined at index:', currentScoringIndex);
                return;
            }
            
            console.log('Current work:', work.title, '(full object:', work, ')');
            document.getElementById('workTitle').textContent = work.title || '[NO TITLE]';
            document.getElementById('scoringContent').style.opacity = '1';
            
            // Load current scores into checkboxes
            const themesCheckboxes = document.querySelectorAll('#themesCheckboxes input');
            themesCheckboxes.forEach(cb => {
                cb.checked = work.scores.themes.includes(cb.value);
            });
            
            const genresCheckboxes = document.querySelectorAll('#genresCheckboxes input');
            genresCheckboxes.forEach(cb => {
                cb.checked = work.scores.genres.includes(cb.value);
            });
            
            updateRelationalSlider();
        }

        function updateRelationalSlider() {
            const axis = document.getElementById('axisSelect').value;
            const work = unscoredWorks[currentScoringIndex];
            
            // Get already scored works on this axis
            const scoredWorks = projects
                .filter(p => !p.isDummy && p.scores[axis] !== null && p.id !== work.id)
                .sort((a, b) => a.scores[axis] - b.scores[axis]);
            
            const referenceContainer = document.getElementById('referenceWorks');
            const sliderTrack = document.getElementById('sliderTrack');
            
            // Clear previous markers
            sliderTrack.querySelectorAll('.slider-marker').forEach(m => m.remove());
            sliderTrack.querySelectorAll('.slider-marker-label').forEach(m => m.remove());
            
            if (scoredWorks.length === 0) {
                referenceContainer.innerHTML = '<div>No other works scored yet - place anywhere</div>';
            } else {
                referenceContainer.innerHTML = '<div>Already scored:</div>' + 
                    scoredWorks.map(w => `<div>• ${w.title} [${w.scores[axis]}%]</div>`).join('');
                
                // Add markers for scored works
                scoredWorks.forEach(w => {
                    const marker = document.createElement('div');
                    marker.className = 'slider-marker';
                    marker.style.left = w.scores[axis] + '%';
                    
                    const label = document.createElement('div');
                    label.className = 'slider-marker-label';
                    label.textContent = w.title.substring(0, 15) + '...';
                    label.style.left = w.scores[axis] + '%';
                    
                    sliderTrack.appendChild(marker);
                    sliderTrack.appendChild(label);
                });
            }
            
            // Set slider position
            const currentScore = work.scores[axis] || 50;
            document.getElementById('sliderHandle').style.left = currentScore + '%';
        }

        // Slider drag functionality
        let isDragging = false;
        const sliderHandle = document.getElementById('sliderHandle');
        const sliderTrack = document.getElementById('sliderTrack');

        sliderHandle.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const rect = sliderTrack.getBoundingClientRect();
            let x = e.clientX - rect.left;
            x = Math.max(0, Math.min(x, rect.width));
            
            const percent = (x / rect.width) * 100;
            sliderHandle.style.left = percent + '%';
        });

        // Axis select change
        document.getElementById('axisSelect').addEventListener('change', updateRelationalSlider);

        // Save score button
        document.getElementById('saveScoreBtn').addEventListener('click', async () => {
            const work = unscoredWorks[currentScoringIndex];
            const axis = document.getElementById('axisSelect').value;
            
            // Get slider position
            const handleLeft = parseFloat(sliderHandle.style.left);
            work.scores[axis] = Math.round(handleLeft);
            
            // Get themes
            const themesChecked = Array.from(document.querySelectorAll('#themesCheckboxes input:checked'))
                .map(cb => cb.value);
            work.scores.themes = themesChecked;
            
            // Get genres
            const genresChecked = Array.from(document.querySelectorAll('#genresCheckboxes input:checked'))
                .map(cb => cb.value);
            work.scores.genres = genresChecked;
            
            await saveProject(work);

            currentScoringIndex++;
            loadNextWorkToScore();
        });

        // Skip button
        document.getElementById('skipBtn').addEventListener('click', () => {
            currentScoringIndex++;
            loadNextWorkToScore();
        });
        
        // Expand button for themes/genres
        document.getElementById('expandBtn').addEventListener('click', function() {
            const collapse = document.getElementById('themesGenresCollapse');
            if (collapse.style.display === 'none') {
                collapse.style.display = 'block';
                this.textContent = '- THEMES/GENRES';
            } else {
                collapse.style.display = 'none';
                this.textContent = '+ THEMES/GENRES';
            }
        });

        // Bottom menu toggles - three states: off, ascending, descending
        let toggleStates = {
            chronology: null, // null, 'asc', 'desc'
            dearness: null,
            completeness: null,
            cost: null
        };

        document.querySelectorAll('.toggle-btn[data-axis]').forEach(btn => {
            btn.addEventListener('click', () => {
                const axis = btn.dataset.axis;
                const arrow = btn.querySelector('.arrow');
                
                // Cycle through states: null → asc → desc → null
                if (toggleStates[axis] === null) {
                    toggleStates[axis] = 'asc';
                    btn.classList.add('active');
                    arrow.textContent = '↑';
                    activeSortAxis = axis;
                    activeSortDirection = 'asc';
                } else if (toggleStates[axis] === 'asc') {
                    toggleStates[axis] = 'desc';
                    arrow.textContent = '↓';
                    activeSortDirection = 'desc';
                } else {
                    toggleStates[axis] = null;
                    btn.classList.remove('active');
                    activeSortAxis = null;
                    activeSortDirection = null;
                }
                
                // Deactivate other toggles
                if (toggleStates[axis] !== null) {
                    document.querySelectorAll('.toggle-btn[data-axis]').forEach(b => {
                        if (b !== btn) {
                            const otherAxis = b.dataset.axis;
                            toggleStates[otherAxis] = null;
                            b.classList.remove('active');
                        }
                    });
                }
            });
        });

        // Theme/Genre dropdowns
        document.getElementById('themesBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('themesDropdown');
            dropdown.classList.toggle('show');
            document.getElementById('genresDropdown').classList.remove('show');
            
            if (dropdown.classList.contains('show') && dropdown.children.length === 0) {
                THEMES.forEach(theme => {
                    const label = document.createElement('label');
                    label.innerHTML = `<input type="checkbox" value="${theme}"> ${theme}`;
                    label.querySelector('input').addEventListener('change', applyFilters);
                    dropdown.appendChild(label);
                });
            }
        });

        document.getElementById('genresBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('genresDropdown');
            dropdown.classList.toggle('show');
            document.getElementById('themesDropdown').classList.remove('show');
            
            if (dropdown.classList.contains('show') && dropdown.children.length === 0) {
                GENRES.forEach(genre => {
                    const label = document.createElement('label');
                    label.innerHTML = `<input type="checkbox" value="${genre}"> ${genre}`;
                    label.querySelector('input').addEventListener('change', applyFilters);
                    dropdown.appendChild(label);
                });
            }
        });

        document.addEventListener('click', () => {
            document.getElementById('themesDropdown').classList.remove('show');
            document.getElementById('genresDropdown').classList.remove('show');
        });

        function applyFilters() {
            const selectedThemes = Array.from(document.querySelectorAll('#themesDropdown input:checked'))
                .map(cb => cb.value);
            const selectedGenres = Array.from(document.querySelectorAll('#genresDropdown input:checked'))
                .map(cb => cb.value);
            
            if (selectedThemes.length === 0 && selectedGenres.length === 0) {
                // No filters, show all
                floatingElements.forEach(el => {
                    el.element.classList.remove('hidden');
                });
                return;
            }
            
            // Apply filters and snap to grid
            floatingElements.forEach((el, index) => {
                const project = projects[index];
                
                const matchesTheme = selectedThemes.length === 0 || 
                    selectedThemes.some(t => project.scores.themes.includes(t));
                const matchesGenre = selectedGenres.length === 0 || 
                    selectedGenres.some(g => project.scores.genres.includes(g));
                
                if (matchesTheme && matchesGenre) {
                    el.element.classList.remove('hidden');
                } else {
                    el.element.classList.add('hidden');
                }
            });
            
            // Snap visible elements to grid
            snapToGrid();
        }

        function snapToGrid() {
            const visible = floatingElements.filter(el => !el.element.classList.contains('hidden'));
            const cols = Math.ceil(Math.sqrt(visible.length));
            const cellWidth = window.innerWidth / cols;
            const cellHeight = (window.innerHeight - 200) / Math.ceil(visible.length / cols);
            
            visible.forEach((el, i) => {
                const row = Math.floor(i / cols);
                const col = i % cols;
                
                el.x = col * cellWidth + cellWidth / 2 - 150;
                el.y = row * cellHeight + cellHeight / 2 + 100;
                el.vx = 0;
                el.vy = 0;
            });
        }

        // Reset button
        document.getElementById('resetBtn').addEventListener('click', () => {
            // Reset sort toggles
            activeSortAxis = null;
            activeSortDirection = null;
            Object.keys(toggleStates).forEach(key => toggleStates[key] = null);
            
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('#themesDropdown input, #genresDropdown input').forEach(cb => cb.checked = false);
            
            floatingElements.forEach(el => {
                el.element.classList.remove('hidden');
                el.vx = (Math.random() - 0.5) * 2;
                el.vy = (Math.random() - 0.5) * 2;
            });
        });

        function linkToCV() {
            window.location.href = 'cv.html';
        }

        // Initialize
        loadProjects();
    </script>
</body>
</html>
