<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; }
        body {
            background: #ef4444;
            transition: background 0.4s ease;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        body.live { background: #22c55e; }

        #start-btn {
            padding: 24px 48px;
            font-size: 22px;
            font-weight: 700;
            background: rgba(255,255,255,0.15);
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 16px;
            color: white;
            cursor: pointer;
            display: none;
            text-align: center;
            line-height: 1.4;
        }
        #start-btn:active { background: rgba(255,255,255,0.35); }

        #status {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            text-align: center;
            padding: 20px;
            max-width: 85%;
            line-height: 1.5;
        }

        /* ---- debug log overlay ---- */
        #debug {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            max-height: 38vh;
            overflow-y: auto;
            background: rgba(0,0,0,0.92);
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            font-size: 11px;
            padding: 6px 8px;
            z-index: 100;
            -webkit-overflow-scrolling: touch;
        }
        #debug.collapsed { max-height: 0; padding: 0; overflow: hidden; }
        .log-line { padding: 1px 0; line-height: 1.35; word-wrap: break-word; }
        .log-info    { color: #d4d4d4; }
        .log-success { color: #4ade80; }
        .log-warn    { color: #facc15; }
        .log-error   { color: #f87171; }
        .log-time    { color: #777; margin-right: 4px; }

        #debug-toggle {
            position: fixed;
            bottom: 0; right: 0;
            padding: 6px 14px;
            background: rgba(0,0,0,0.6);
            color: #aaa;
            font-size: 11px;
            z-index: 101;
            border: none;
            border-radius: 10px 0 0 0;
        }

        /* ---- audio level meter ---- */
        #audio-meter-wrap {
            position: fixed;
            top: 12px; left: 12px; right: 12px;
            height: 28px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            z-index: 90;
            display: none;
        }
        #audio-meter-bar {
            height: 100%;
            width: 0%;
            background: #4ade80;
            transition: width 0.1s linear;
            border-radius: 8px;
        }
        #audio-meter-label {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        /* ---- now playing bar ---- */
        #now-playing-bar {
            position: fixed;
            top: 44px; left: 12px; right: 12px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 6px;
            color: #f0c05a;
            font-size: 12px;
            font-weight: 600;
            z-index: 89;
            display: none;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---- YouTube music player ---- */
        #yt-music-player-wrap {
            position: fixed;
            bottom: 60px; left: 8px;
            width: 160px; height: 90px;
            z-index: 80;
            border-radius: 8px;
            overflow: hidden;
            opacity: 0.4;
        }

        /* health stats + volume override — hidden inside debug log only */
    </style>
</head>

<script>
// ============================================================
// CONFIG
// ============================================================
const CLIENT_ID   = '129984821928-u6iqasj284ffcmkh15on4gsnbbah7pvo.apps.googleusercontent.com';
const SCOPES      = 'https://www.googleapis.com/auth/youtube';
const pathname    = window.location.pathname.replace(/index\.html$/, '');
const REDIRECT_URI = window.location.origin + pathname;
const DEFAULT_RELAY = 'wss://dance.danyelica.fish';

// ============================================================
// STATE
// ============================================================
let accessToken       = null;
let tokenExpiresAt    = 0;
let videoStream       = null;   // MediaStream (video, possibly + audio)
let hasAudio          = false;  // did we get mic access?
let streamSocket      = null;   // WebSocket to relay
let mediaRecorder     = null;
let isStreaming       = false;
let currentBroadcastId = null;
let currentStreamId    = null;
let currentStreamKey   = null;
let currentClientId    = null;
let wakeLock           = null;
let debugCollapsed     = false;
let chunksSent         = 0;
let bytesSent          = 0;

// ---- Music queue state ----
let ytPlayer           = null;
let ytReady            = false;
let currentQueue       = [];
let currentSong        = null;
let musicPlaying       = false;

// ============================================================
// DEVOTION — Time-based volume curve
// ============================================================
const DEVOTION_START_HOUR = 9;       // 9:00 AM — volume begins at 0%
const DEVOTION_END_HOUR   = 19.667;  // ~7:40 PM — same rate continues to 100%
const DEVOTION_MAX_VOLUME = 100;
let devotionVolume        = 0;
let devotionInterval      = null;

function getDevotionVolume() {
    var now = new Date();
    var currentMinutes = now.getHours() * 60 + now.getMinutes();
    var startMinutes = DEVOTION_START_HOUR * 60;
    var endMinutes = DEVOTION_END_HOUR * 60;
    if (currentMinutes <= startMinutes) return 0;
    if (currentMinutes >= endMinutes) return DEVOTION_MAX_VOLUME;
    var elapsed = currentMinutes - startMinutes;
    return Math.round(DEVOTION_MAX_VOLUME * (elapsed / (endMinutes - startMinutes)));
}

function updateDevotionVolume() {
    devotionVolume = getDevotionVolume();
    if (ytReady && ytPlayer && ytPlayer.setVolume) {
        ytPlayer.setVolume(devotionVolume);
    }
    log('Devotion volume: ' + devotionVolume + '%');
}

function initDevotion() {
    updateDevotionVolume();
    devotionInterval = setInterval(updateDevotionVolume, 60000);
}

// ============================================================
// MUSIC PLAYER (YouTube IFrame)
// ============================================================
function loadMusicPlayer() {
    return new Promise(function(resolve) {
        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-music-player', {
                width: '160',
                height: '90',
                playerVars: {
                    autoplay: 0,
                    controls: 1,
                    modestbranding: 1,
                    rel: 0,
                    playsinline: 1
                },
                events: {
                    onReady: function() {
                        ytReady = true;
                        updateDevotionVolume();
                        log('Music player ready', 'success');
                        resolve();
                    },
                    onStateChange: onMusicStateChange,
                    onError: onMusicError
                }
            });
        };
        var tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);
    });
}

function onMusicStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        log('Song ended — advancing queue');
        advanceMusicQueue();
    } else if (event.data === YT.PlayerState.PLAYING) {
        musicPlaying = true;
    } else if (event.data === YT.PlayerState.PAUSED) {
        musicPlaying = false;
    }
}

function onMusicError(event) {
    log('Music player error (code ' + event.data + ') — skipping', 'warn');
    setTimeout(advanceMusicQueue, 2000);
}

function handleQueueUpdate(queue) {
    currentQueue = queue;
    // If nothing is currently playing, play the next waiting song
    var playing = queue.find(function(s) { return s.status === 'playing'; });
    if (!playing) {
        playNextSong();
    }
}

function playNextSong() {
    var next = currentQueue.find(function(s) { return s.status === 'waiting'; });
    if (!next) {
        currentSong = null;
        musicPlaying = false;
        updateNowPlaying(null);
        return;
    }

    // Skip non-YouTube songs automatically
    if (!next.youtubeId) {
        log('Skipping "' + next.title + '" (no YouTube match)', 'warn');
        updateSongStatus(next.id, 'played');
        setTimeout(playNextSong, 500);
        return;
    }

    currentSong = next;
    updateSongStatus(next.id, 'playing');
    setNowPlaying(next.id);
    updateNowPlaying(next);

    log('Playing: ' + next.title + (next.artist ? ' — ' + next.artist : ''), 'success');

    if (ytReady && ytPlayer && ytPlayer.loadVideoById) {
        ytPlayer.loadVideoById(next.youtubeId);
        updateDevotionVolume();
    }
}

function advanceMusicQueue() {
    if (currentSong) {
        updateSongStatus(currentSong.id, 'played');
    }
    currentSong = null;
    setTimeout(playNextSong, 1500);
}

function updateNowPlaying(song) {
    var bar = document.getElementById('now-playing-bar');
    var label = document.getElementById('np-song');
    if (song) {
        label.textContent = song.title + (song.artist ? ' — ' + song.artist : '');
        bar.style.display = 'block';
    } else {
        bar.style.display = 'none';
    }
}

// Skip current song (callable from console for manual control)
window.skipSong = advanceMusicQueue;

// ============================================================
// DEBUG / LOGGING  (on-screen so you can see it on the phone)
// ============================================================
const logEntries = [];

function log(msg, level) {
    level = level || 'info';
    const t = new Date().toLocaleTimeString('en-US', { hour12: false });
    logEntries.push({ t, msg, level });
    // Also output to real console for Safari Web Inspector if connected
    if (level === 'error') console.error('[' + t + '] ' + msg);
    else if (level === 'warn') console.warn('[' + t + '] ' + msg);
    else console.log('[' + t + '] ' + msg);
    renderLog();
}

function renderLog() {
    var el = document.getElementById('debug');
    if (!el || debugCollapsed) return;
    var recent = logEntries.slice(-40);
    el.innerHTML = recent.map(function(e) {
        return '<div class="log-line log-' + e.level + '"><span class="log-time">' + e.t + '</span>' + esc(e.msg) + '</div>';
    }).join('');
    el.scrollTop = el.scrollHeight;
}

function esc(s) { // basic HTML escape
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleDebug() {
    debugCollapsed = !debugCollapsed;
    var el = document.getElementById('debug');
    if (debugCollapsed) { el.classList.add('collapsed'); }
    else { el.classList.remove('collapsed'); renderLog(); }
}

// ============================================================
// UI HELPERS
// ============================================================
function setStatus(text) {
    document.getElementById('status').textContent = text;
}

function showStartButton(label) {
    var btn = document.getElementById('start-btn');
    btn.textContent = label || 'TAP TO START';
    btn.style.display = 'block';
    document.getElementById('status').style.display = 'none';
}

function hideStartButton() {
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('status').style.display = 'block';
}

function setLive(live) {
    if (live) {
        document.body.classList.add('live');
        // Clean screen — hide everything except the color
        document.getElementById('status').style.display = 'none';
        document.getElementById('audio-meter-wrap').style.display = 'none';
        document.getElementById('now-playing-bar').style.display = 'none';
        document.getElementById('yt-music-player-wrap').style.opacity = '0';
    } else {
        document.body.classList.remove('live');
    }
}

// ============================================================
// OAUTH  — token stored with expiry; no aggressive re-validation
// ============================================================
function loadToken() {
    accessToken    = localStorage.getItem('yt_access_token');
    tokenExpiresAt = parseInt(localStorage.getItem('yt_token_expires') || '0', 10);
}

function saveToken(token, expiresIn) {
    accessToken    = token;
    tokenExpiresAt = Date.now() + (expiresIn * 1000);
    localStorage.setItem('yt_access_token', token);
    localStorage.setItem('yt_token_expires', tokenExpiresAt.toString());
}

function clearToken() {
    accessToken = null;
    tokenExpiresAt = 0;
    localStorage.removeItem('yt_access_token');
    localStorage.removeItem('yt_token_expires');
}

function isTokenFresh() {
    // Consider token fresh if it has > 2 minutes remaining
    return accessToken && (Date.now() < tokenExpiresAt - 120000);
}

function checkAuthCallback() {
    var hash = window.location.hash;
    if (hash.includes('access_token')) {
        var params = new URLSearchParams(hash.substring(1));
        var token = params.get('access_token');
        var expiresIn = parseInt(params.get('expires_in') || '3600', 10);
        saveToken(token, expiresIn);
        history.replaceState(null, '', window.location.pathname);
        log('Token saved — expires in ' + Math.round(expiresIn / 60) + ' min', 'success');
        return true;
    }
    return false;
}

function redirectToAuth() {
    log('Redirecting to Google login…', 'warn');
    setStatus('Redirecting to Google login…');
    setTimeout(function() {
        var authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
            'client_id=' + CLIENT_ID +
            '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
            '&response_type=token' +
            '&scope=' + encodeURIComponent(SCOPES) +
            '&include_granted_scopes=true' +
            '&prompt=consent';
        window.location.href = authUrl;
    }, 1500);
}

// Light-weight token check: only call the API if we aren't sure locally
async function ensureAuth() {
    loadToken();

    if (isTokenFresh()) {
        var minsLeft = Math.round((tokenExpiresAt - Date.now()) / 60000);
        log('Token looks good (' + minsLeft + ' min left)');
        return true;
    }

    // Token missing or expired locally
    if (!accessToken) {
        log('No token found', 'warn');
        return false;
    }

    // Token exists but might be expired — quick API check
    log('Token may be expired, verifying with YouTube…');
    try {
        var resp = await fetch('https://www.googleapis.com/youtube/v3/channels?part=id&mine=true', {
            headers: { 'Authorization': 'Bearer ' + accessToken }
        });
        if (resp.ok) {
            // Token still works — extend our local expiry estimate by 30 min
            tokenExpiresAt = Date.now() + 1800000;
            localStorage.setItem('yt_token_expires', tokenExpiresAt.toString());
            log('Token still valid (extended estimate)', 'success');
            return true;
        }
        log('Token rejected by YouTube (HTTP ' + resp.status + ')', 'error');
    } catch (e) {
        log('Network error checking token: ' + e.message, 'error');
    }

    clearToken();
    return false;
}

// ============================================================
// CAMERA + AUDIO
// ============================================================
let audioAnalyser = null;   // Web Audio analyser for level meter
let audioCtx      = null;   // AudioContext kept alive for meter

function startAudioMeter(stream) {
    try {
        var AudioCtxClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtxClass) { log('No AudioContext — meter unavailable', 'warn'); return; }

        audioCtx = new AudioCtxClass();
        audioCtx.resume();

        var source = audioCtx.createMediaStreamSource(stream);
        audioAnalyser = audioCtx.createAnalyser();
        audioAnalyser.fftSize = 256;
        source.connect(audioAnalyser);
        // Do NOT connect to destination — we don't want to play mic back through speaker

        document.getElementById('audio-meter-wrap').style.display = 'block';
        pollAudioLevel();
        log('Audio level meter started', 'success');
    } catch (e) {
        log('Audio meter failed: ' + e.message, 'warn');
    }
}

function pollAudioLevel() {
    if (!audioAnalyser) return;
    var data = new Uint8Array(audioAnalyser.frequencyBinCount);
    audioAnalyser.getByteFrequencyData(data);

    // RMS-ish level from frequency bins
    var sum = 0;
    for (var i = 0; i < data.length; i++) sum += data[i];
    var avg = sum / data.length;
    var pct = Math.min(100, Math.round((avg / 128) * 100));

    var bar = document.getElementById('audio-meter-bar');
    var label = document.getElementById('audio-meter-label');
    bar.style.width = pct + '%';
    bar.style.background = pct > 5 ? '#4ade80' : '#f87171';
    label.textContent = pct > 5 ? 'MIC LIVE — ' + pct + '%' : 'MIC SILENT';

    requestAnimationFrame(pollAudioLevel);
}

function stopAudioMeter() {
    audioAnalyser = null;
    if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; }
    var wrap = document.getElementById('audio-meter-wrap');
    if (wrap) wrap.style.display = 'none';
}

function logTrackDetails(label, tracks) {
    tracks.forEach(function(t, i) {
        log(label + '[' + i + ']: kind=' + t.kind +
            ' enabled=' + t.enabled +
            ' muted=' + t.muted +
            ' readyState=' + t.readyState +
            ' label="' + t.label + '"');
    });
}

async function startCameraAndAudio() {
    // --- Step 1: Video only (never affects music) ---
    log('Requesting camera (video only)…');
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacing, width: { ideal: videoWidth }, height: { ideal: videoHeight } },
            audio: false
        });
        log('Camera started', 'success');
        logTrackDetails('Video track ', videoStream.getVideoTracks());
    } catch (err) {
        log('Camera failed: ' + err.name + ' — ' + err.message, 'error');
        return false;
    }

    // --- Step 2: Try to warm up audio session (may help preserve bg music) ---
    try {
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
            var ctx = new AudioCtx();
            await ctx.resume();
            var buf = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
            var src = ctx.createBufferSource();
            src.buffer = buf;
            src.connect(ctx.destination);
            src.start();
            log('Audio session pre-warmed (sampleRate=' + ctx.sampleRate + ')');
            // Close this temporary context so it doesn't interfere
            setTimeout(function() { ctx.close(); }, 500);
        }
    } catch (e) {
        log('Audio warm-up skipped: ' + e.message, 'warn');
    }

    // --- Step 3: Request microphone ---
    log('Requesting microphone…');
    log('(Your music may pause briefly — this is normal on iOS)');
    try {
        var audioStream = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false
            }
        });

        // Diagnose audio tracks
        var audioTracks = audioStream.getAudioTracks();
        log('Got ' + audioTracks.length + ' audio track(s)', 'success');
        logTrackDetails('Audio track ', audioTracks);

        if (audioTracks.length === 0 || audioTracks[0].readyState !== 'live') {
            log('WARNING: Audio track is not live!', 'error');
        }

        // Listen for track ending unexpectedly
        audioTracks.forEach(function(t) {
            t.onended = function() { log('Audio track ENDED unexpectedly!', 'error'); };
            t.onmute = function() { log('Audio track MUTED', 'warn'); };
            t.onunmute = function() { log('Audio track UN-MUTED', 'success'); };
        });

        // Combine video + audio into one stream
        var combined = new MediaStream();
        videoStream.getVideoTracks().forEach(function(t) { combined.addTrack(t); });
        audioTracks.forEach(function(t) { combined.addTrack(t); });
        videoStream = combined;
        hasAudio = true;

        // Verify combined stream
        log('Combined stream: ' +
            videoStream.getVideoTracks().length + ' video, ' +
            videoStream.getAudioTracks().length + ' audio tracks');

        // Start the visual audio level meter
        startAudioMeter(audioStream);

        log('Microphone enabled!', 'success');
        log('CHECK: Is your music still playing?', 'warn');
        log('If music stopped → switch to your music app, press play, then come back', 'warn');
    } catch (err) {
        log('Mic denied or failed: ' + err.name + ' — ' + err.message, 'warn');
        log('Continuing WITHOUT audio (video only)', 'warn');
        hasAudio = false;
    }

    return true;
}

// ============================================================
// YOUTUBE API
// ============================================================
async function ytFetch(url, options) {
    options = options || {};
    options.headers = options.headers || {};
    options.headers['Authorization'] = 'Bearer ' + accessToken;
    var resp = await fetch(url, options);
    if (!resp.ok) {
        var body;
        try { body = await resp.json(); } catch(e) { body = {}; }
        var msg = (body.error && body.error.message) || ('HTTP ' + resp.status);
        throw new Error(msg);
    }
    return resp.json();
}

async function createYouTubeBroadcast() {
    log('Creating YouTube broadcast…');

    // 1. Create broadcast
    var broadcast = await ytFetch(
        'https://www.googleapis.com/youtube/v3/liveBroadcasts?part=snippet,status,contentDetails',
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                snippet: {
                    title: 'Dance Session ' + new Date().toLocaleString(),
                    scheduledStartTime: new Date().toISOString()
                },
                status: {
                    privacyStatus: 'unlisted',
                    selfDeclaredMadeForKids: false
                },
                contentDetails: {
                    enableAutoStart: true,
                    enableAutoStop: true
                }
            })
        }
    );
    currentBroadcastId = broadcast.id;
    log('Broadcast created: ' + currentBroadcastId, 'success');

    // 2. Create stream
    log('Creating YouTube stream…');
    var stream = await ytFetch(
        'https://www.googleapis.com/youtube/v3/liveStreams?part=snippet,cdn',
        {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                snippet: { title: 'Dance Stream ' + Date.now() },
                cdn: { frameRate: '30fps', ingestionType: 'rtmp', resolution: '720p' }
            })
        }
    );
    currentStreamId  = stream.id;
    currentStreamKey = stream.cdn.ingestionInfo.streamName;
    log('Stream created: ' + currentStreamId, 'success');

    // 3. Bind stream to broadcast
    log('Binding stream to broadcast…');
    await ytFetch(
        'https://www.googleapis.com/youtube/v3/liveBroadcasts/bind?id=' + currentBroadcastId +
        '&part=id&streamId=' + currentStreamId,
        { method: 'POST' }
    );
    log('Bound!', 'success');

    // 4. Brief delay for YouTube to set up RTMP ingest
    log('Waiting 2s for YouTube RTMP endpoint…');
    await sleep(2000);

    return currentStreamKey;
}

// Poll stream status
async function waitForStreamActive(maxWaitMs) {
    maxWaitMs = maxWaitMs || 60000;
    log('Waiting for YouTube to confirm stream is active…');
    var start = Date.now();
    while (Date.now() - start < maxWaitMs) {
        try {
            var data = await ytFetch(
                'https://www.googleapis.com/youtube/v3/liveStreams?part=status&id=' + currentStreamId
            );
            if (data.items && data.items[0]) {
                var s = data.items[0].status.streamStatus;
                log('Stream status: ' + s);
                if (s === 'active') return true;
            }
        } catch (e) {
            log('Error checking stream: ' + e.message, 'warn');
        }
        await sleep(3000);
    }
    log('Timed out waiting for stream to go active', 'warn');
    return false;
}

// Get broadcast lifecycle status
async function getBroadcastStatus() {
    try {
        var data = await ytFetch(
            'https://www.googleapis.com/youtube/v3/liveBroadcasts?part=status&id=' + currentBroadcastId
        );
        if (data.items && data.items[0]) return data.items[0].status;
    } catch (e) {
        log('Error getting broadcast status: ' + e.message, 'warn');
    }
    return null;
}

// Manually transition to live
async function transitionToLive() {
    log('Requesting broadcast transition to LIVE…');
    try {
        await ytFetch(
            'https://www.googleapis.com/youtube/v3/liveBroadcasts/transition?broadcastStatus=live&id=' +
            currentBroadcastId + '&part=status',
            { method: 'POST' }
        );
        log('Transition request sent', 'success');
    } catch (e) {
        log('Transition failed: ' + e.message, 'error');
    }
}

// Wait for broadcast to reach "live", with automatic manual fallback
async function waitForBroadcastLive(maxWaitMs) {
    maxWaitMs = maxWaitMs || 20000;
    log('Waiting for broadcast to go LIVE…');
    var start = Date.now();
    var triedManual = false;

    while (Date.now() - start < maxWaitMs) {
        var status = await getBroadcastStatus();
        if (status) {
            var lcs = status.lifeCycleStatus;
            log('Broadcast: ' + lcs + '  (' + Math.round((Date.now() - start) / 1000) + 's)');

            if (lcs === 'live') {
                log('Broadcast is LIVE!', 'success');
                log('Watch: https://youtube.com/watch?v=' + currentBroadcastId, 'success');
                return true;
            }

            // After 8s in "ready", try manual transition
            if (!triedManual && lcs === 'ready' && (Date.now() - start) > 8000) {
                triedManual = true;
                await transitionToLive();
            }
        }
        await sleep(2500);
    }

    log('Broadcast did not reach LIVE within timeout', 'warn');
    return false;
}

// Expose for manual testing in Safari console
window.getBroadcastStatus     = getBroadcastStatus;
window.transitionToLive       = transitionToLive;
window.waitForBroadcastLive   = waitForBroadcastLive;

// ============================================================
// STREAMING  (relay server + WebSocket + MediaRecorder)
// ============================================================
async function startStreaming() {
    if (isStreaming) return;
    log('--- Starting stream pipeline ---');

    // Wake lock
    await requestWakeLock();

    var relay = localStorage.getItem('relayUrl') || DEFAULT_RELAY;
    currentClientId = 'yt_' + Date.now();

    try {
        // 1. YouTube broadcast
        var streamKey = await createYouTubeBroadcast();

        // 2. Detect supported MediaRecorder format
        var mimeType = '';
        var candidates = [
            'video/mp4',                          // iOS Safari
            'video/webm;codecs=vp9,opus',         // Chrome with audio
            'video/webm;codecs=vp9',              // Chrome video-only
            'video/webm;codecs=vp8,opus',
            'video/webm;codecs=vp8',
            'video/webm'
        ];
        for (var i = 0; i < candidates.length; i++) {
            if (MediaRecorder.isTypeSupported(candidates[i])) {
                mimeType = candidates[i];
                break;
            }
        }
        log('MediaRecorder format: ' + (mimeType || '(default)'));

        // 3. Register with relay
        log('Registering with relay server…');
        var httpRelay = relay.replace('wss://', 'https://').replace('ws://', 'http://');
        var regResp = await fetch(httpRelay + '/start-stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                streamKey: streamKey,
                clientId: currentClientId,
                mimeType: mimeType,
                hasAudio: hasAudio
            })
        });
        if (!regResp.ok) {
            var regErr = await regResp.text();
            throw new Error('Relay registration failed: ' + regErr);
        }
        log('Registered with relay', 'success');

        // 4. Connect WebSocket
        log('Connecting WebSocket to relay…');
        streamSocket = new WebSocket(relay + '?clientId=' + currentClientId);

        streamSocket.onopen = function() {
            log('WebSocket connected', 'success');

            // 5. Start MediaRecorder
            var options = { videoBitsPerSecond: 2500000 };
            if (mimeType) options.mimeType = mimeType;

            try {
                mediaRecorder = new MediaRecorder(videoStream, options);
            } catch (recErr) {
                log('MediaRecorder creation failed: ' + recErr.message, 'error');
                log('Trying without explicit mimeType…', 'warn');
                mediaRecorder = new MediaRecorder(videoStream, { videoBitsPerSecond: 2500000 });
            }

            // --- Phase 1 diagnostics: log exactly what MediaRecorder is using ---
            log('MediaRecorder created:');
            log('  mimeType: ' + (mediaRecorder.mimeType || '(empty)'));
            log('  stream video tracks: ' + videoStream.getVideoTracks().length);
            log('  stream audio tracks: ' + videoStream.getAudioTracks().length);
            var at = videoStream.getAudioTracks();
            at.forEach(function(t, i) {
                log('  audio[' + i + ']: enabled=' + t.enabled + ' muted=' + t.muted + ' state=' + t.readyState);
            });

            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0 && streamSocket && streamSocket.readyState === WebSocket.OPEN) {
                    streamSocket.send(e.data);
                    chunksSent++;
                    bytesSent += e.data.size;
                    if (chunksSent % 10 === 0) {
                        log('Sent ' + chunksSent + ' chunks (' + formatBytes(bytesSent) + ')');
                    }
                    // Log first chunk details
                    if (chunksSent === 1) {
                        log('First chunk: ' + formatBytes(e.data.size) + ' type=' + (e.data.type || '(none)'), 'success');
                    }
                }
            };

            mediaRecorder.onerror = function(e) {
                log('MediaRecorder error: ' + (e.error ? e.error.message : 'unknown'), 'error');
            };

            mediaRecorder.onstop = function() {
                log('MediaRecorder stopped');
            };

            mediaRecorder.start(1000); // request data every 1s
            log('MediaRecorder started (1s chunks)', 'success');

            isStreaming = true;
            chunksSent = 0;
            bytesSent  = 0;
            setStatus('Streaming…');

            // 6. Wait for YouTube to confirm stream is active, then broadcast live
            (async function() {
                var active = await waitForStreamActive(90000); // 90s timeout
                if (active) {
                    var live = await waitForBroadcastLive(20000);
                    if (live) {
                        setLive(true);
                        setStatus('LIVE');
                        log('GREEN — stream is live on YouTube!', 'success');
                    } else {
                        // Turn green anyway — video is recording even if broadcast status is delayed
                        setLive(true);
                        setStatus('Streaming (broadcast pending)');
                        log('Turned green — video is flowing, broadcast may still be transitioning', 'warn');
                    }
                } else {
                    setLive(true);
                    setStatus('Streaming (status unknown)');
                    log('Stream active check timed out. Data IS flowing (' + chunksSent + ' chunks sent). Turning green.', 'warn');
                }
            })();
        };

        streamSocket.onclose = handleSocketClose;

        streamSocket.onerror = function() {
            log('WebSocket error — check relay server', 'error');
            setLive(false);
        };

        // Start monitoring
        startHealthMonitor();
        startClientLogging();

    } catch (err) {
        log('Stream pipeline failed: ' + err.message, 'error');
        setLive(false);
        setStatus('Error — see log');

        // If auth error, clear token
        if (err.message && (err.message.includes('401') || err.message.toLowerCase().includes('auth') || err.message.toLowerCase().includes('credentials'))) {
            log('Looks like an auth error — clearing token', 'warn');
            clearToken();
            showStartButton('LOGIN & RETRY');
        }
    }
}

async function stopStreaming() {
    if (!isStreaming) return;
    log('--- Stopping stream ---');

    setLive(false);
    setStatus('Stopped');
    isStreaming = false;

    stopAudioMeter();
    stopHealthMonitor();
    stopClientLogging();
    reconnectAttempts = 0;
    await releaseWakeLock();

    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        try { mediaRecorder.stop(); } catch(e) {}
    }
    if (streamSocket) {
        try { streamSocket.close(); } catch(e) {}
    }

    // Tell relay to stop
    var relay = localStorage.getItem('relayUrl') || DEFAULT_RELAY;
    try {
        var httpRelay = relay.replace('wss://', 'https://').replace('ws://', 'http://');
        await fetch(httpRelay + '/stop-stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientId: currentClientId })
        });
        log('Relay notified of stop', 'success');
    } catch (e) {
        log('Could not notify relay: ' + e.message, 'warn');
    }

    // End YouTube broadcast
    if (currentBroadcastId && accessToken) {
        try {
            await ytFetch(
                'https://www.googleapis.com/youtube/v3/liveBroadcasts/transition?broadcastStatus=complete&id=' +
                currentBroadcastId + '&part=id',
                { method: 'POST' }
            );
            log('YouTube broadcast ended', 'success');
        } catch (e) {
            log('Could not end broadcast: ' + e.message, 'warn');
        }
    }

    log('Final stats: ' + chunksSent + ' chunks, ' + formatBytes(bytesSent));

    mediaRecorder = null;
    streamSocket  = null;
    currentBroadcastId = null;
    currentStreamId    = null;
    currentStreamKey   = null;

    // Allow restart
    showStartButton('TAP TO RESTART');
}

// ============================================================
// MOTION DETECTION  (only used to STOP the stream)
// ============================================================
function initMotion() {
    if (!window.DeviceMotionEvent) {
        log('DeviceMotion not available on this device', 'warn');
        return;
    }

    // iOS 13+ requires permission request (needs user gesture — handled in onStartTap)
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
            .then(function(state) {
                if (state === 'granted') {
                    window.addEventListener('devicemotion', handleMotion);
                    log('Motion permission granted', 'success');
                } else {
                    log('Motion permission denied — picking up phone won\'t auto-stop', 'warn');
                }
            })
            .catch(function(err) {
                log('Motion permission error: ' + err.message, 'warn');
            });
    } else {
        window.addEventListener('devicemotion', handleMotion);
        log('Motion listener attached');
    }
}

function handleMotion(e) {
    var a = e.accelerationIncludingGravity;
    if (!a) return;
    var movement = Math.abs(Math.sqrt(a.x * a.x + a.y * a.y + a.z * a.z) - 9.8);

    if (movement > 2.0 && isStreaming) {
        log('Motion detected (movement=' + movement.toFixed(1) + ') — stopping stream', 'warn');
        stopStreaming();
    }
}

// ============================================================
// WAKE LOCK
// ============================================================
async function requestWakeLock() {
    if (!('wakeLock' in navigator)) {
        log('Wake Lock API not supported — screen may turn off', 'warn');
        return;
    }
    try {
        wakeLock = await navigator.wakeLock.request('screen');
        log('Wake lock acquired — screen will stay on', 'success');
        wakeLock.addEventListener('release', function() {
            log('Wake lock released');
        });
    } catch (err) {
        log('Wake lock failed: ' + err.message, 'warn');
    }
}

async function releaseWakeLock() {
    if (wakeLock) {
        try { await wakeLock.release(); } catch(e) {}
        wakeLock = null;
    }
}

// Re-acquire on visibility change
document.addEventListener('visibilitychange', async function() {
    if (document.visibilityState === 'visible' && isStreaming && !wakeLock) {
        await requestWakeLock();
    }
});

// ============================================================
// UTILITIES
// ============================================================
function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

function formatBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
}

// ============================================================
// REMOTE CLIENT LOGGING — POSTs state to relay every 30s
// ============================================================
let clientLogInterval = null;

function startClientLogging() {
    if (clientLogInterval) return;
    clientLogInterval = setInterval(sendClientLog, 30000);
    sendClientLog(); // send immediately
}

function sendClientLog() {
    if (!currentClientId) return;
    var relay = localStorage.getItem('relayUrl') || DEFAULT_RELAY;
    var httpRelay = relay.replace('wss://', 'https://').replace('ws://', 'http://');
    var state = {
        isStreaming: isStreaming,
        hasAudio: hasAudio,
        musicPlaying: musicPlaying,
        currentSong: currentSong ? currentSong.title : null,
        chunksSent: chunksSent,
        bytesSent: bytesSent,
        audioTracks: videoStream ? videoStream.getAudioTracks().map(function(t) {
            return { enabled: t.enabled, muted: t.muted, readyState: t.readyState };
        }) : [],
        devotionVolume: devotionVolume,
        socketState: streamSocket ? streamSocket.readyState : -1,
        recorderState: mediaRecorder ? mediaRecorder.state : 'none'
    };
    try {
        fetch(httpRelay + '/client-log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                clientId: currentClientId,
                logs: logEntries.slice(-30),
                state: state
            })
        }).catch(function() {}); // fire and forget
    } catch(e) {}
}

function stopClientLogging() {
    if (clientLogInterval) { clearInterval(clientLogInterval); clientLogInterval = null; }
}

// ============================================================
// WEBSOCKET AUTO-RECONNECT
// ============================================================
let reconnectAttempts = 0;
const MAX_RECONNECT = 5;

function handleSocketClose(e) {
    log('WebSocket closed (code=' + e.code + ' reason=' + (e.reason || 'none') + ')', 'warn');

    // If we were streaming and it wasn't a clean close, try to reconnect
    if (isStreaming && e.code !== 1000 && reconnectAttempts < MAX_RECONNECT) {
        reconnectAttempts++;
        var delay = Math.min(2000 * reconnectAttempts, 10000);
        log('Reconnecting in ' + (delay/1000) + 's (attempt ' + reconnectAttempts + '/' + MAX_RECONNECT + ')…', 'warn');

        setTimeout(function() {
            if (!isStreaming) return;
            var relay = localStorage.getItem('relayUrl') || DEFAULT_RELAY;
            log('Reconnecting WebSocket…');
            streamSocket = new WebSocket(relay + '?clientId=' + currentClientId);
            streamSocket.onopen = function() {
                log('WebSocket reconnected!', 'success');
                reconnectAttempts = 0;
            };
            streamSocket.onclose = handleSocketClose;
            streamSocket.onerror = function() {
                log('WebSocket reconnect error', 'error');
            };
        }, delay);
    } else if (isStreaming) {
        log('Max reconnect attempts reached — stopping stream', 'error');
        stopStreaming();
    }
}

// ============================================================
// STREAM HEALTH INDICATOR
// ============================================================
let healthInterval = null;
let lastChunkCount = 0;
let streamStartTime = 0;

function startHealthMonitor() {
    streamStartTime = Date.now();
    lastChunkCount = 0;
    healthInterval = setInterval(updateHealth, 2000);
}

function stopHealthMonitor() {
    if (healthInterval) { clearInterval(healthInterval); healthInterval = null; }
    document.getElementById('health-stats').textContent = '';
    document.getElementById('health-bar-fill').style.width = '0%';
}

function updateHealth() {
    var chunksPerSec = ((chunksSent - lastChunkCount) / 2).toFixed(1);
    lastChunkCount = chunksSent;
    var elapsed = Math.round((Date.now() - streamStartTime) / 1000);
    var mins = Math.floor(elapsed / 60);
    var secs = elapsed % 60;
    var timeStr = mins + ':' + (secs < 10 ? '0' : '') + secs;

    var statsEl = document.getElementById('health-stats');
    statsEl.textContent = timeStr + ' | ' + formatBytes(bytesSent) + ' | ' + chunksPerSec + ' c/s';

    // Health bar — green if data flowing, red if stalled
    var bar = document.getElementById('health-bar-fill');
    if (parseFloat(chunksPerSec) > 0) {
        bar.style.width = '100%';
        bar.style.background = '#4ade80';
    } else {
        bar.style.width = '100%';
        bar.style.background = '#f87171';
    }
}

// ============================================================
// CAMERA TOGGLE (front/back)
// ============================================================
let currentFacing = 'user'; // 'user' = front, 'environment' = back

async function toggleCamera() {
    currentFacing = (currentFacing === 'user') ? 'environment' : 'user';
    log('Switching to ' + (currentFacing === 'user' ? 'front' : 'back') + ' camera…');

    try {
        var newVideoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacing, width: { ideal: videoWidth }, height: { ideal: videoHeight } },
            audio: false
        });

        // Replace video track in the combined stream
        var oldTrack = videoStream.getVideoTracks()[0];
        var newTrack = newVideoStream.getVideoTracks()[0];

        if (mediaRecorder && mediaRecorder.state === 'recording') {
            // Can't swap tracks mid-recording on iOS — log a warning
            log('Camera will switch on next stream start (cannot swap mid-recording on iOS)', 'warn');
            newTrack.stop();
        } else {
            if (oldTrack) oldTrack.stop();
            videoStream.removeTrack(oldTrack);
            videoStream.addTrack(newTrack);
            log('Camera switched to ' + (currentFacing === 'user' ? 'front' : 'back'), 'success');
        }
    } catch (err) {
        log('Camera switch failed: ' + err.message, 'error');
        // revert
        currentFacing = (currentFacing === 'user') ? 'environment' : 'user';
    }
}

// ============================================================
// PHASE 3: Audio pre-flight test
// Records a short clip and checks if the blob contains audio
// ============================================================
function testAudioCapture() {
    return new Promise(function(resolve) {
        try {
            var testOptions = {};
            // Use same mimeType detection as the real recorder
            var candidates = [
                'video/mp4',
                'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp8,opus',
                'video/webm'
            ];
            for (var i = 0; i < candidates.length; i++) {
                if (MediaRecorder.isTypeSupported(candidates[i])) {
                    testOptions.mimeType = candidates[i];
                    break;
                }
            }

            log('Test recorder mimeType: ' + (testOptions.mimeType || '(default)'));
            var testRec = new MediaRecorder(videoStream, testOptions);
            var testChunks = [];

            testRec.ondataavailable = function(e) {
                if (e.data.size > 0) testChunks.push(e.data);
            };

            testRec.onstop = function() {
                var blob = new Blob(testChunks, { type: testRec.mimeType });
                log('Test clip: ' + formatBytes(blob.size) + ' type=' + blob.type);

                // Heuristic: a 2s video-only clip at 720p is ~50-200KB
                // With audio it's typically larger. But more importantly,
                // we can check if the blob type mentions audio codecs
                var hasAudioCodec = blob.type.includes('opus') ||
                                    blob.type.includes('aac') ||
                                    blob.type.includes('mp4a');
                if (hasAudioCodec) {
                    log('Test clip type includes audio codec — good sign', 'success');
                }

                // Also try to read the blob header for audio track indicators
                // For MP4: look for 'mp4a' or 'esds' atoms
                // For WebM: look for audio track entry
                var reader = new FileReader();
                reader.onload = function() {
                    var arr = new Uint8Array(reader.result);
                    var str = '';
                    // Check first 2KB for audio markers
                    var checkLen = Math.min(arr.length, 2048);
                    for (var j = 0; j < checkLen; j++) {
                        if (arr[j] >= 32 && arr[j] <= 126) str += String.fromCharCode(arr[j]);
                    }

                    var foundAudio = str.includes('mp4a') || str.includes('esds') ||
                                     str.includes('soun') || str.includes('Audio');
                    var foundVideo = str.includes('avc1') || str.includes('vide') ||
                                     str.includes('VP') || str.includes('Video');

                    log('Test clip binary scan: video=' + foundVideo + ' audio=' + foundAudio);
                    if (foundAudio) {
                        log('AUDIO TRACK DETECTED in test clip!', 'success');
                        resolve(true);
                    } else {
                        log('No audio track markers found in test clip', 'warn');
                        resolve(false);
                    }
                };
                reader.onerror = function() {
                    log('Could not read test clip', 'warn');
                    resolve(false);
                };
                reader.readAsArrayBuffer(blob);
            };

            testRec.start();
            setTimeout(function() {
                if (testRec.state === 'recording') {
                    testRec.stop();
                }
            }, 2000);

        } catch (e) {
            log('Audio test failed: ' + e.message, 'warn');
            resolve(false);
        }
    });
}

// ============================================================
// MAIN "TAP TO START" HANDLER
// ============================================================
async function onStartTap() {
    hideStartButton();
    setStatus('Starting…');

    // Auth check
    var authed = await ensureAuth();
    if (!authed) {
        redirectToAuth();
        return;
    }

    // Camera + Audio
    var camOk = await startCameraAndAudio();
    if (!camOk) {
        setStatus('Camera failed — check permissions');
        showStartButton('RETRY');
        return;
    }

    // Motion detection (for auto-stop)
    initMotion();

    // Relay health check
    var relay = localStorage.getItem('relayUrl') || DEFAULT_RELAY;
    var httpRelay = relay.replace('wss://', 'https://').replace('ws://', 'http://');
    log('Checking relay server health…');
    try {
        var healthResp = await fetch(httpRelay + '/health');
        if (healthResp.ok) {
            var h = await healthResp.json();
            log('Relay OK — ' + h.activeStreams + ' active streams', 'success');
        } else {
            throw new Error('HTTP ' + healthResp.status);
        }
    } catch (e) {
        log('Relay unreachable: ' + e.message, 'error');
        setStatus('Cannot reach relay server');
        showStartButton('RETRY');
        return;
    }

    // --- Phase 3: Pre-flight audio test ---
    // Record a 2-second test clip to verify MediaRecorder actually muxes audio
    if (hasAudio) {
        log('Running 2s audio pre-flight test…');
        setStatus('Testing audio capture…');
        var testPassed = await testAudioCapture();
        if (!testPassed) {
            log('Pre-flight: MediaRecorder may not be muxing audio', 'warn');
            log('Audio meter should still show levels — mic is live, but container may lack audio track', 'warn');
            log('Relay server will use silent fallback if needed', 'warn');
        }
    }

    // Countdown
    if (musicPlaying) {
        log('Music playing from THE QUEUE — mic will capture room audio', 'success');
    }
    setStatus('Starting in 3…');
    await sleep(1000);
    setStatus('Starting in 2…');
    await sleep(1000);
    setStatus('Starting in 1…');
    await sleep(1000);

    // GO
    setStatus('Connecting…');
    startStreaming();
}

// ============================================================
// INIT  (runs on page load)
// ============================================================
async function init() {
    log('Dance Clips v3 — init (with music queue)');
    log('Device: ' + navigator.userAgent.slice(0, 80));

    // Ensure relay URL is set
    if (!localStorage.getItem('relayUrl')) {
        localStorage.setItem('relayUrl', DEFAULT_RELAY);
    }

    // Check OAuth callback (returning from Google login)
    var justAuthed = checkAuthCallback();

    // Load stored token
    loadToken();

    if (accessToken) {
        if (isTokenFresh()) {
            var mins = Math.round((tokenExpiresAt - Date.now()) / 60000);
            log('Logged in (' + mins + ' min remaining)', 'success');
        } else {
            log('Token found but may be expired — will verify on start');
        }
    } else {
        log('Not logged in');
    }

    // Initialize music queue (Firebase + YouTube player)
    try {
        if (typeof initFirebase === 'function' && initFirebase()) {
            log('Firebase connected — music queue active', 'success');
            log('Submit songs: ' + SITE_URL + '/submit/', 'success');
            loadMusicPlayer();
            initDevotion();
            resetPlayingToWaiting().then(function() {
                onQueueChange(handleQueueUpdate);
            });
        } else {
            log('Music queue unavailable — streaming only', 'warn');
        }
    } catch (e) {
        log('Music queue init failed: ' + e.message, 'warn');
    }

    // Show the start button
    if (accessToken) {
        showStartButton('TAP TO START');
    } else {
        showStartButton('TAP TO LOGIN');
    }
}

window.onload = init;
</script>
</body>
</html>
