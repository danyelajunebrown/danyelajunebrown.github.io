<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Feels — Live (spectator / phone test view)</title>
<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  *{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-user-select:none;user-select:none;}

  /* one tap: requests motion permission (iOS) + enters the scene */
  #begin{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:#000;color:#8a8aff;cursor:pointer;
    font-weight:300;letter-spacing:3px;font-size:15px;text-transform:uppercase;text-align:center;padding:24px;}
  #begin small{opacity:.5;font-size:11px;letter-spacing:2px;margin-top:14px;max-width:300px;}
  #begin .pulse{animation:breathe 3.6s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.3}50%{opacity:.8}}
  .gone{display:none!important;}

  /* HUD: current emotion + status */
  #hud{position:fixed;top:14px;left:0;right:0;text-align:center;color:#fff;z-index:50;pointer-events:none;}
  #hudWord{font-size:24px;font-weight:300;letter-spacing:1px;text-shadow:0 2px 16px rgba(0,0,0,.7);}
  #hudDate{font-size:12px;letter-spacing:2px;opacity:.6;text-transform:uppercase;margin-top:2px;}
  #hudState{font-size:10px;letter-spacing:2px;opacity:.45;text-transform:uppercase;margin-top:6px;}

  /* control pad hovering over the scene */
  #pad{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;
    align-items:flex-end;padding:18px 18px calc(18px + env(safe-area-inset-bottom));pointer-events:none;}
  .cluster{display:grid;gap:8px;pointer-events:auto;}
  .look{grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);}
  .walk{grid-template-columns:64px;gap:10px;}
  .btn{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.22);color:#fff;
    border-radius:12px;backdrop-filter:blur(8px);font-size:18px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:none;}
  .btn:active{background:rgba(255,255,255,.28);}
  .walk .btn{height:54px;font-size:13px;letter-spacing:1px;font-weight:600;}
  .spacer{visibility:hidden;}
</style>
</head>
<body>
  <div id="begin"><div class="pulse">the feels</div><small id="beginSub">tap to step in — your phone will ask for motion access so turning it turns your view</small></div>

  <div id="hud" class="gone">
    <div id="hudWord">—</div>
    <div id="hudDate"></div>
    <div id="hudState"></div>
  </div>

  <div id="pad" class="gone">
    <!-- LOOK pad (always works; gyro + drag also look) -->
    <div class="cluster look">
      <div class="spacer"></div><div class="btn" data-look="up">▲</div><div class="spacer"></div>
      <div class="btn" data-look="left">◄</div><div class="spacer"></div><div class="btn" data-look="right">►</div>
      <div class="spacer"></div><div class="btn" data-look="down">▼</div><div class="spacer"></div>
    </div>
    <!-- WALK pad (also advanced by real steps after permission) -->
    <div class="cluster walk">
      <div class="btn" data-walk="fwd">FWD</div>
      <div class="btn" data-walk="back">BACK</div>
    </div>
  </div>

  <a-scene id="scene" background="color:#000" renderer="colorManagement:true;antialias:true"
           vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false"
           feels-world>
    <a-entity id="rig" position="0 0 0">
      <a-camera id="cam" look-controls="enabled:false" wasd-controls="enabled:false" position="0 1.4 0"></a-camera>
    </a-entity>
    <a-entity id="word" visible="false">
      <a-text id="wordText" value="" align="center" anchor="center" color="#ffffff" width="6"></a-text>
    </a-entity>
  </a-scene>

<script>
/* ====== Supabase (anonymous, read-only by RLS) ====== */
const { createClient } = window.supabase;
const supabaseClient = createClient(
  'https://bczevwhzlammcjomuqrg.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjemV2d2h6bGFtbWNqb211cXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg1NzkzMzQsImV4cCI6MjA3NDE1NTMzNH0.m8dgNY4UdUWvCTCe1_Zn2Ifbzym9dS7NMk7jxTg0_T4'
);
const KIOSK_USER_ID = 'ee04c688-d857-45f8-849c-2f072053cf28';

/* ====== Emotion family -> color (only the COLOR comes from family; the cell's
   identity + word are always the SPECIFIC logged feeling) ====== */
const emotionWheelData = {
  "Happy":{color:"#FFE680",m:[["Playful",["Aroused","Cheeky"]],["Content",["Free","Joyful"]],["Interested",["Inquisitive","Curious"]],["Proud",["Successful","Confident"]],["Accepted",["Respected","Valued"]],["Powerful",["Courageous","Creative"]],["Peaceful",["Loving","Thankful"]],["Trusting",["Sensitive","Intimate"]],["Optimistic",["Hopeful","Inspired"]]]},
  "Surprised":{color:"#DDA0DD",m:[["Startled",["Shocked","Dismayed"]],["Confused",["Disillusioned","Perplexed"]],["Amazed",["Awe","Astonished"]],["Excited",["Eager","Energetic"]]]},
  "Disgusted":{color:"#90EE90",m:[["Disapproving",["Judgmental","Embarrassed"]],["Disappointed",["Appalled","Revolted"]],["Awful",["Nauseated","Detestable"]],["Avoidance",["Hesitant","Aversion"]]]},
  "Bad":{color:"#D3D3D3",m:[["Bored",["Indifferent","Apathetic"]],["Busy",["Pressured","Rushed"]],["Stressed",["Overwhelmed","Out of control"]],["Tired",["Sleepy","Unfocussed"]]]},
  "Fearful":{color:"#FFB347",m:[["Scared",["Helpless","Frightened"]],["Anxious",["Overwhelmed","Worried"]],["Insecure",["Inadequate","Inferior"]],["Weak",["Worthless","Insignificant"]],["Rejected",["Excluded","Persecuted"]],["Threatened",["Nervous","Exposed"]]]},
  "Angry":{color:"#FF6B6B",m:[["Let down",["Betrayed","Resentful"]],["Humiliated",["Disrespected","Ridiculed"]],["Bitter",["Indignant","Violated"]],["Mad",["Furious","Jealous"]],["Aggressive",["Provoked","Hostile"]],["Frustrated",["Infuriated","Annoyed"]],["Distant",["Withdrawn","Numb"]],["Critical",["Skeptical","Dismissive"]]]},
  "Sad":{color:"#87CEEB",m:[["Hurt",["Embarrassed","Disappointed"]],["Depressed",["Inferior","Empty"]],["Guilty",["Remorseful","Ashamed"]],["Despair",["Grief","Powerless"]],["Vulnerable",["Fragile","Victimized"]],["Lonely",["Isolated","Abandoned"]]]}
};
const DEFAULT_COLOR="#9d8cff", colorMap={};
for(const [fam,d] of Object.entries(emotionWheelData)){
  colorMap[fam.toLowerCase()]=d.color;
  for(const [mid,outs] of d.m){ colorMap[mid.toLowerCase()]=d.color; outs.forEach(o=>colorMap[o.toLowerCase()]=d.color); }
}
colorMap['anxiety']=colorMap['anxious']; colorMap['tired or disappointed']=colorMap['tired'];
const feelingColor = f => colorMap[(f||"").toLowerCase()] || DEFAULT_COLOR;

/* ====== Path ====== */
const PATH_LENGTH = 172.5;     // total virtual depth (m) the whole timeline maps onto
const CELL_W = 60, CELL_H = 60; // a cell is as wide/tall as is visible — bigger than any room
const WIN_BACK = 6, WIN_FWD = 35; // only render cells within this depth window of the walker
const monthFmt = new Intl.DateTimeFormat('en',{month:'long',year:'numeric'});

function buildSegments(entries){
  const now=Date.now();
  const ts=entries.map(e=>new Date(e.timestamp).getTime());
  const dur=entries.map((e,i)=>Math.max(0,((i<entries.length-1)?ts[i+1]:now)-ts[i]));
  let total=dur.reduce((a,b)=>a+b,0); if(total<=0){dur.fill(1);total=dur.length;}
  let acc=0;
  return entries.map((e,i)=>{
    const startM=(acc/total)*PATH_LENGTH; acc+=dur[i]; const endM=(acc/total)*PATH_LENGTH;
    const intensity=Math.min(5,Math.max(1,parseInt(e.intensity)||1));
    return { feeling:(e.feeling||'—').toString(), intensity, hex:feelingColor(e.feeling),
             opacity:intensity*0.10, startM, endM, ts:ts[i] };
  });
}

/* ====== The world ====== */
AFRAME.registerComponent('feels-world', {
  init: function(){
    const THREE = AFRAME.THREE;
    this.rig  = document.getElementById('rig').object3D;
    this.cam  = document.getElementById('cam');
    this.word = document.getElementById('word');
    this.wordTxt = document.getElementById('wordText');
    this.sceneObj = this.el.object3D;

    this.segments = [];
    this.cells = new Map();          // index -> THREE.Mesh (pooled visible window)
    this.pathPos = 0;                // metres along the path
    this.yaw = 0; this.pitch = 0;    // look (radians)
    this.walkInput = 0;              // -1 back, +1 fwd from held buttons
    this.stepImpulse = 0;            // metres queued from detected steps
    this.gyro = null;                // {alpha0, on}
    this.STEP_M = PATH_LENGTH/240;   // ~one logged-day per physical step (tunable)
    this.WALK_SPEED = PATH_LENGTH/40;// metres/sec on a held button (full path in ~40s)

    // ---- LvrSesh (headset session) state ----
    // broadcast contract from vr.html on channel 'feels-live', event 'state':
    //   { progress: 0..1, moving: bool, resume: 'hold' | 'crossfade' | null }
    this.lastProgress = 0;
    this.lastMovingAt = 0;
    this.GRACE_MS = 30000;           // debounce: session counts as live up to 30s after motion
    this.resumeMode = null;          // honoured on a false->true flip
    this.wasLive = false;

    this.tmpCol = new THREE.Color();

    this.setupControls();
    this.subscribeLive();
    this.load();
  },

  // ---------- data ----------
  load: async function(){
    try{
      const { data, error } = await supabaseClient
        .from('diary_entries').select('feeling,intensity,timestamp')
        .eq('user_id', KIOSK_USER_ID).order('timestamp',{ascending:true});
      if(error) throw error;
      this.segments = buildSegments(data||[]);
      this.setState(this.segments.length ? 'explore — no live session' : 'no feelings found');
    }catch(e){ this.setState('could not load'); }
    // keep the timeline fresh
    setInterval(async ()=>{
      try{
        const { data } = await supabaseClient.from('diary_entries')
          .select('feeling,intensity,timestamp').eq('user_id',KIOSK_USER_ID).order('timestamp',{ascending:true});
        if(data && data.length) this.segments = buildSegments(data);
      }catch(e){}
    }, 60000);
  },

  // ---------- live session ----------
  subscribeLive: function(){
    supabaseClient.channel('feels-live')
      .on('broadcast',{event:'state'}, ({payload})=>{
        if(!payload || typeof payload.progress!=='number') return;
        this.lastProgress = Math.max(0,Math.min(1,payload.progress));
        if(payload.moving) this.lastMovingAt = Date.now();
        if(payload.resume) this.resumeMode = payload.resume;
      }).subscribe();
  },
  isLive: function(){ return (Date.now()-this.lastMovingAt) < this.GRACE_MS; },

  // ---------- controls ----------
  setupControls: function(){
    // LOOK buttons (hold)
    document.querySelectorAll('[data-look]').forEach(b=>{
      const dir=b.dataset.look; let id=null;
      const start=e=>{e.preventDefault(); if(id)return; id=setInterval(()=>{
        const s=0.045;
        if(dir==='left') this.yaw+=s; else if(dir==='right') this.yaw-=s;
        else if(dir==='up') this.pitch=Math.min(1.45,this.pitch+s);
        else if(dir==='down') this.pitch=Math.max(-1.45,this.pitch-s);
      },16);};
      const stop=()=>{clearInterval(id);id=null;};
      b.addEventListener('touchstart',start,{passive:false}); b.addEventListener('mousedown',start);
      ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>b.addEventListener(ev,stop));
    });
    // WALK buttons (hold) — disabled while a live session drives position
    document.querySelectorAll('[data-walk]').forEach(b=>{
      const dir=b.dataset.walk;
      const start=e=>{e.preventDefault(); this.walkInput = dir==='fwd'?1:-1;};
      const stop=()=>{ this.walkInput = 0; };
      b.addEventListener('touchstart',start,{passive:false}); b.addEventListener('mousedown',start);
      ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>b.addEventListener(ev,stop));
    });
    // DRAG to look (pointer)
    let dragging=false, px=0, py=0;
    const sceneEl=this.el.sceneEl;
    const down=e=>{const t=e.touches?e.touches[0]:e; dragging=true; px=t.clientX; py=t.clientY;};
    const move=e=>{ if(!dragging)return; const t=e.touches?e.touches[0]:e;
      this.yaw  -= (t.clientX-px)*0.005; this.pitch=Math.max(-1.45,Math.min(1.45,this.pitch-(t.clientY-py)*0.005));
      px=t.clientX; py=t.clientY; };
    const up=()=>{dragging=false;};
    sceneEl.addEventListener('mousedown',down); window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
    sceneEl.addEventListener('touchstart',down,{passive:true}); window.addEventListener('touchmove',move,{passive:true}); window.addEventListener('touchend',up);
  },

  // gyro: turning the phone turns the view; accelerometer peaks = steps forward
  enableMotion: function(){
    window.addEventListener('deviceorientation', e=>{
      if(e.alpha==null) return;
      if(!this.gyro) this.gyro={alpha0:e.alpha};
      // relative yaw from start heading; beta (front-back tilt) nudges pitch. Rough but live; per-browser axes vary.
      this.yaw   = -((e.alpha - this.gyro.alpha0) * Math.PI/180);
      this.pitch = Math.max(-1.45, Math.min(1.45, ((e.beta||90)-90) * Math.PI/180));
    });
    let lastPeak=0;
    window.addEventListener('devicemotion', e=>{
      const a=e.accelerationIncludingGravity; if(!a) return;
      const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
      const now=performance.now();
      if(mag>13 && now-lastPeak>350){ lastPeak=now; this.stepImpulse += this.STEP_M; } // step detected
    });
  },

  // ---------- per-frame ----------
  tick: function(time, dt){
    if(!this.segments.length) return;
    const d = Math.min(dt||16, 50)/1000;
    const live = this.isLive();

    // ---- position ----
    if(live){
      // spectator rides with the headset (auto-glide). resume 'hold' freezes; else glide to it.
      if(this.resumeMode==='hold'){ /* stay put this session-resume */ }
      else { const target=this.lastProgress*PATH_LENGTH; this.pathPos += (target-this.pathPos)*Math.min(1,6*d); }
      this.walkInput=0; this.stepImpulse=0;            // independent walk locked during a session
    }else{
      this.resumeMode=null;
      this.pathPos += this.walkInput*this.WALK_SPEED*d + this.stepImpulse;
      this.stepImpulse=0;
    }
    this.pathPos = Math.max(0, Math.min(PATH_LENGTH, this.pathPos));

    // ---- look + walk applied (look stays personal in every state) ----
    this.rig.position.z = -this.pathPos;
    this.rig.rotation.y = this.yaw;
    this.cam.object3D.rotation.x = this.pitch;

    // ---- visible cells (windowed translucent boxes) ----
    this.updateCells();

    // ---- current cell -> HUD + floating word ----
    let idx=-1;
    for(let i=0;i<this.segments.length;i++){ if(this.pathPos>=this.segments[i].startM && this.pathPos<this.segments[i].endM){idx=i;break;} }
    if(idx<0 && this.pathPos>=PATH_LENGTH) idx=this.segments.length-1;
    if(idx>=0){
      const s=this.segments[idx];
      document.getElementById('hudWord').textContent=s.feeling;
      document.getElementById('hudDate').textContent=monthFmt.format(new Date(s.ts));
      this.wordTxt.setAttribute('value', s.feeling);
      const wp=this.word.object3D.position; wp.set(0,1.4,-(this.pathPos+3));
      this.word.setAttribute('visible', true);
      this.word.object3D.lookAt(0,1.4,-this.pathPos); this.word.object3D.rotateY(Math.PI);
    }else{
      document.getElementById('hudWord').textContent='—';
      document.getElementById('hudDate').textContent='';
      this.word.setAttribute('visible', false);
    }
    this.setState(live?'live session — gliding with the walk':'explore — no live session');
  },

  updateCells: function(){
    const THREE=AFRAME.THREE;
    const lo=this.pathPos-WIN_BACK, hi=this.pathPos+WIN_FWD;
    const want=new Set();
    for(let i=0;i<this.segments.length;i++){
      const s=this.segments[i];
      if(s.endM>lo && s.startM<hi && (s.endM-s.startM)>0.02){ want.add(i);  // skip sub-2cm slivers (imperceptible)
        if(!this.cells.has(i)){
          const depth=Math.max(0.02,s.endM-s.startM);
          const geo=new THREE.BoxGeometry(CELL_W,CELL_H,depth);
          const mat=new THREE.MeshBasicMaterial({color:new THREE.Color(s.hex),transparent:true,
            opacity:s.opacity,side:THREE.DoubleSide,depthWrite:false});
          const mesh=new THREE.Mesh(geo,mat);
          mesh.position.set(0,CELL_H/2-1.2,-((s.startM+s.endM)/2));
          mesh.renderOrder=1;
          this.sceneObj.add(mesh); this.cells.set(i,mesh);
        }
      }
    }
    for(const [i,mesh] of this.cells){ if(!want.has(i)){ this.sceneObj.remove(mesh);
      mesh.geometry.dispose(); mesh.material.dispose(); this.cells.delete(i);} }
  },

  setState: function(t){ const el=document.getElementById('hudState'); if(el) el.textContent=t; }
});

/* ====== Begin: one tap requests motion permission (iOS) then enters ====== */
(function(){
  const begin=document.getElementById('begin'), sub=document.getElementById('beginSub');
  const enter=()=>{ document.getElementById('hud').classList.remove('gone');
    document.getElementById('pad').classList.remove('gone'); begin.classList.add('gone');
    const comp=document.getElementById('scene').components['feels-world']; if(comp) comp.enableMotion(); };
  begin.addEventListener('click', async ()=>{
    const needsiOS = typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function';
    const needsOri = typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function';
    try{
      if(needsiOS) await DeviceMotionEvent.requestPermission();
      if(needsOri) await DeviceOrientationEvent.requestPermission();
    }catch(e){ /* denied -> buttons + drag still work */ }
    enter();
  }, {once:true});
})();
</script>
</body>
</html>
