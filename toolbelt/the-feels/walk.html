<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Feels — Walk</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
        * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-tap-highlight-color: transparent; }

        /* full-screen color flood — the iPhone-in-hand analogue of the Quest's color wash */
        #stage {
            position: fixed; inset: 0;
            background: #0a0a14;
            transition: background-color 0.6s ease;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 8vh 6vw;
            box-sizing: border-box;
        }
        #word {
            color: #fff; font-weight: 200; font-size: 16vw;
            letter-spacing: 1px; line-height: 1.1;
            text-shadow: 0 2px 30px rgba(0,0,0,0.6);
        }
        #meta {
            margin-top: 4vh; color: rgba(255,255,255,0.55);
            font-size: 3.4vw; letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* the same year-long timeline as live.html, drawn in CSS at the bottom */
        #track { position: fixed; left: 0; right: 0; bottom: 0; height: 56px; }
        #bar { display: block; width: 100%; height: 14px; position: absolute; bottom: 26px; }
        #dot {
            position: absolute; bottom: 19px; width: 0; height: 0;
            transform: translateX(-50%);
            transition: left 0.6s ease;
        }
        #dot::after {
            content: ''; position: absolute; left: 0; bottom: 0;
            width: 20px; height: 20px; transform: translateX(-50%);
            border-radius: 50%; background: #fff;
            box-shadow: 0 0 16px rgba(255,255,255,0.9);
        }
        #caption {
            position: absolute; left: 0; right: 0; bottom: 4px;
            text-align: center; color: rgba(255,255,255,0.45);
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
        }

        /* the only UI before the walk: a single tap surface */
        #tap {
            position: fixed; inset: 0; z-index: 999;
            display: flex; align-items: center; justify-content: center;
            background: #000; color: #6a6a8a; cursor: pointer;
            font-weight: 300; letter-spacing: 3px; font-size: 16px;
            text-transform: uppercase; text-align: center; padding: 32px;
        }
        #tap span { animation: breathe 3.6s ease-in-out infinite; }
        @keyframes breathe { 0%,100% { opacity: 0.28; } 50% { opacity: 0.72; } }
        .gone { display: none !important; }

        #err {
            position: fixed; left: 16px; right: 16px; bottom: 80px;
            color: rgba(255,255,255,0.65); font-size: 13px;
            letter-spacing: 1px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="stage">
        <div id="word"></div>
        <div id="meta"></div>
    </div>

    <div id="track">
        <canvas id="bar"></canvas>
        <div id="dot"></div>
        <div id="caption">the feels — walk</div>
    </div>

    <div id="err"></div>

    <div id="tap"><span id="tapMsg">the feels</span></div>

    <script>
    // ---------- Supabase (same project + same RLS as vr.html / live.html) ----------
    const { createClient } = window.supabase;
    const supabaseClient = createClient(
        'https://bczevwhzlammcjomuqrg.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjemV2d2h6bGFtbWNqb211cXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg1NzkzMzQsImV4cCI6MjA3NDE1NTMzNH0.m8dgNY4UdUWvCTCe1_Zn2Ifbzym9dS7NMk7jxTg0_T4'
    );
    const KIOSK_USER_ID = 'ee04c688-d857-45f8-849c-2f072053cf28';

    // ---------- Path: same coordinates the Quest uses ----------
    const START = { lat: 42.003567, lng: -73.921784 };
    const END   = { lat: 42.003286, lng: -73.923837 };
    const PATH_LENGTH = 172.5;   // haversine(START, END)

    function haversine(a, b) {
        const R = 6371000;
        const lat1 = a.lat * Math.PI / 180, lat2 = b.lat * Math.PI / 180;
        const dLat = (b.lat - a.lat) * Math.PI / 180;
        const dLng = (b.lng - a.lng) * Math.PI / 180;
        const x = Math.sin(dLat/2) ** 2 +
                  Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng/2) ** 2;
        return 2 * R * Math.asin(Math.sqrt(x));
    }
    function bearing(a, b) {
        const lat1 = a.lat * Math.PI / 180, lat2 = b.lat * Math.PI / 180;
        const dLng = (b.lng - a.lng) * Math.PI / 180;
        const y = Math.sin(dLng) * Math.cos(lat2);
        const x = Math.cos(lat1) * Math.sin(lat2) -
                  Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
        return Math.atan2(y, x);
    }
    const PATH_BEARING = bearing(START, END);

    // Project the walker's GPS position onto the start->end line, in metres.
    function progressFor(pos) {
        const d = haversine(START, pos);
        if (d < 0.5) return 0;
        const along = d * Math.cos(bearing(START, pos) - PATH_BEARING);
        return Math.max(0, Math.min(PATH_LENGTH, along));
    }

    // ---------- Emotion family -> color (mirrors vr.html / live.html) ----------
    const emotionWheelData = {
        "Happy":     { color: "#FFE680", middleEmotions: [
            {name:"Playful",   outerEmotions:["Aroused","Cheeky"]},
            {name:"Content",   outerEmotions:["Free","Joyful"]},
            {name:"Interested",outerEmotions:["Inquisitive","Curious"]},
            {name:"Proud",     outerEmotions:["Successful","Confident"]},
            {name:"Accepted",  outerEmotions:["Respected","Valued"]},
            {name:"Powerful",  outerEmotions:["Courageous","Creative"]},
            {name:"Peaceful",  outerEmotions:["Loving","Thankful"]},
            {name:"Trusting",  outerEmotions:["Sensitive","Intimate"]},
            {name:"Optimistic",outerEmotions:["Hopeful","Inspired"]}]},
        "Surprised": { color: "#DDA0DD", middleEmotions: [
            {name:"Startled",outerEmotions:["Shocked","Dismayed"]},
            {name:"Confused",outerEmotions:["Disillusioned","Perplexed"]},
            {name:"Amazed",  outerEmotions:["Awe","Astonished"]},
            {name:"Excited", outerEmotions:["Eager","Energetic"]}]},
        "Disgusted": { color: "#90EE90", middleEmotions: [
            {name:"Disapproving",outerEmotions:["Judgmental","Embarrassed"]},
            {name:"Disappointed",outerEmotions:["Appalled","Revolted"]},
            {name:"Awful",       outerEmotions:["Nauseated","Detestable"]},
            {name:"Avoidance",   outerEmotions:["Hesitant","Aversion"]}]},
        "Bad":       { color: "#D3D3D3", middleEmotions: [
            {name:"Bored",    outerEmotions:["Indifferent","Apathetic"]},
            {name:"Busy",     outerEmotions:["Pressured","Rushed"]},
            {name:"Stressed", outerEmotions:["Overwhelmed","Out of control"]},
            {name:"Tired",    outerEmotions:["Sleepy","Unfocussed"]}]},
        "Fearful":   { color: "#FFB347", middleEmotions: [
            {name:"Scared",    outerEmotions:["Helpless","Frightened"]},
            {name:"Anxious",   outerEmotions:["Overwhelmed","Worried"]},
            {name:"Insecure",  outerEmotions:["Inadequate","Inferior"]},
            {name:"Weak",      outerEmotions:["Worthless","Insignificant"]},
            {name:"Rejected",  outerEmotions:["Excluded","Persecuted"]},
            {name:"Threatened",outerEmotions:["Nervous","Exposed"]}]},
        "Angry":     { color: "#FF6B6B", middleEmotions: [
            {name:"Let down",   outerEmotions:["Betrayed","Resentful"]},
            {name:"Humiliated", outerEmotions:["Disrespected","Ridiculed"]},
            {name:"Bitter",     outerEmotions:["Indignant","Violated"]},
            {name:"Mad",        outerEmotions:["Furious","Jealous"]},
            {name:"Aggressive", outerEmotions:["Provoked","Hostile"]},
            {name:"Frustrated", outerEmotions:["Infuriated","Annoyed"]},
            {name:"Distant",    outerEmotions:["Withdrawn","Numb"]},
            {name:"Critical",   outerEmotions:["Skeptical","Dismissive"]}]},
        "Sad":       { color: "#87CEEB", middleEmotions: [
            {name:"Hurt",      outerEmotions:["Embarrassed","Disappointed"]},
            {name:"Depressed", outerEmotions:["Inferior","Empty"]},
            {name:"Guilty",    outerEmotions:["Remorseful","Ashamed"]},
            {name:"Despair",   outerEmotions:["Grief","Powerless"]},
            {name:"Vulnerable",outerEmotions:["Fragile","Victimized"]},
            {name:"Lonely",    outerEmotions:["Isolated","Abandoned"]}]}
    };
    const DEFAULT_COLOR = "#9d8cff";
    const colorMap = {};
    Object.entries(emotionWheelData).forEach(([fam, d]) => {
        colorMap[fam.toLowerCase()] = d.color;
        d.middleEmotions.forEach(m => {
            colorMap[m.name.toLowerCase()] = d.color;
            m.outerEmotions.forEach(o => { colorMap[o.toLowerCase()] = d.color; });
        });
    });
    colorMap['anxiety'] = colorMap['anxious'];
    colorMap['tired or disappointed'] = colorMap['tired'];
    const feelingColor = (f) => colorMap[(f || "").toLowerCase()] || DEFAULT_COLOR;

    // intensity bakes into the wash by mixing with a dark base
    function envColor(hex, intensity) {
        const r0 = 10, g0 = 10, b0 = 20;
        const r = parseInt(hex.slice(1,3),16),
              g = parseInt(hex.slice(3,5),16),
              b = parseInt(hex.slice(5,7),16);
        const t = 0.32 + intensity * 0.13;
        const mix = (a,c) => Math.round(a + (c - a) * t);
        return `rgb(${mix(r0,r)}, ${mix(g0,g)}, ${mix(b0,b)})`;
    }

    // ---------- Timeline build (same shape vr.html and live.html use) ----------
    let segments = [];
    function buildSegments(entries) {
        const now = Date.now();
        const ts = entries.map(e => new Date(e.timestamp).getTime());
        const durations = entries.map((e, i) =>
            Math.max(0, ((i < entries.length - 1) ? ts[i + 1] : now) - ts[i]));
        let total = durations.reduce((a, b) => a + b, 0);
        if (total <= 0) { durations.fill(1); total = durations.length; }

        let acc = 0;
        segments = entries.map((e, i) => {
            const startF = acc / total;
            acc += durations[i];
            const intensity = Math.min(5, Math.max(1, parseInt(e.intensity) || 1));
            return {
                feeling: (e.feeling || '—').toString(),
                intensity,
                hex: feelingColor(e.feeling),
                startF, endF: acc / total,
                ts: ts[i]
            };
        });
        drawBar();
    }

    // ---------- The bottom timeline bar ----------
    const bar = document.getElementById('bar');
    function drawBar() {
        if (!segments.length) return;
        const w = bar.clientWidth, h = bar.clientHeight || 14;
        bar.width = w; bar.height = h;
        const ctx = bar.getContext('2d');
        ctx.clearRect(0, 0, w, h);
        segments.forEach(s => {
            const x = s.startF * w, ww = Math.max(1, (s.endF - s.startF) * w);
            ctx.fillStyle = s.hex;
            ctx.fillRect(x, 0, ww + 0.5, h);
        });
    }
    window.addEventListener('resize', drawBar);

    // ---------- Render + broadcast ----------
    const stage = document.getElementById('stage');
    const wordEl = document.getElementById('word');
    const metaEl = document.getElementById('meta');
    const dotEl = document.getElementById('dot');
    const monthFmt = new Intl.DateTimeFormat('en', { month: 'long', year: 'numeric' });

    // share the same Realtime channel vr.html broadcasts on, so live.html "just works"
    const liveChannel = supabaseClient.channel('feels-live');
    liveChannel.subscribe();
    let lastBroadcast = 0;

    function render(progressM) {
        if (!segments.length) return;
        const f = Math.max(0, Math.min(1, progressM / PATH_LENGTH));
        let seg = segments[segments.length - 1];
        for (let i = 0; i < segments.length; i++) {
            if (f >= segments[i].startF && f < segments[i].endF) { seg = segments[i]; break; }
        }
        stage.style.backgroundColor = envColor(seg.hex, seg.intensity);
        wordEl.textContent = seg.feeling;
        metaEl.textContent = monthFmt.format(new Date(seg.ts));
        dotEl.style.left = (f * 100) + '%';

        const now = performance.now();
        if (now - lastBroadcast > 250) {
            lastBroadcast = now;
            liveChannel.send({ type: 'broadcast', event: 'state', payload: { progress: f } });
        }
    }

    // ---------- GPS ----------
    // Light EMA smoothing on the projected progress to take the edge off iPhone jitter (~5-10m).
    let smoothed = null;
    function smooth(next) {
        if (smoothed === null) { smoothed = next; return next; }
        const k = 0.35;
        smoothed = smoothed + (next - smoothed) * k;
        return smoothed;
    }

    const errEl = document.getElementById('err');
    function showErr(msg) { errEl.textContent = msg; }

    function startWalk() {
        document.getElementById('tap').classList.add('gone');
        if (!('geolocation' in navigator)) {
            showErr('this phone has no location — walk cannot run');
            return;
        }
        navigator.geolocation.watchPosition(
            (pos) => {
                showErr('');
                const here = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                const along = progressFor(here);
                render(smooth(along));
            },
            (err) => {
                showErr({
                    1: 'location permission denied — open Settings > Safari > Location to allow',
                    2: 'location unavailable — try outside with sky view',
                    3: 'location timed out — still trying'
                }[err.code] || 'location error');
            },
            { enableHighAccuracy: true, maximumAge: 1000, timeout: 15000 }
        );
    }

    // ---------- Load and arm ----------
    async function loadEntries() {
        const { data, error } = await supabaseClient
            .from('diary_entries')
            .select('feeling, intensity, timestamp')
            .eq('user_id', KIOSK_USER_ID)
            .order('timestamp', { ascending: true });
        if (error) throw error;
        return data || [];
    }

    window.addEventListener('DOMContentLoaded', async () => {
        const msg = document.getElementById('tapMsg');
        try {
            const entries = await loadEntries();
            if (!entries.length) {
                msg.textContent = 'no feelings found';
                document.getElementById('tap').style.cursor = 'default';
                return;
            }
            buildSegments(entries);
            document.getElementById('tap').addEventListener('click', startWalk, { once: true });

            setInterval(async () => {
                try {
                    const fresh = await loadEntries();
                    if (fresh.length) buildSegments(fresh);
                } catch (e) { /* keep current */ }
            }, 60000);
        } catch (err) {
            msg.textContent = 'could not load';
            document.getElementById('tap').style.cursor = 'default';
        }
    });
    </script>
</body>
</html>
